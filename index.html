<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_CRITICAL_HOMIK</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: black;
            color: white;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            cursor: none;
            user-select: none;
        }

        h1 {
            font-family: 'Courier New', monospace;
            font-size: clamp(50px, 15vw, 150px);
            z-index: 1000;
            position: relative;
            text-shadow: 0 0 20px red;
        }

        .fake-popup {
            position: absolute;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right: 2px solid #000;
            border-bottom: 2px solid #000;
            width: 200px;
            height: 100px;
            padding: 2px;
            z-index: 500;
            pointer-events: none;
        }

        .popup-bar {
            background: darkblue;
            height: 18px;
            width: 100%;
        }
    </style>
</head>
<body onclick="startChaos()">

    <h1>HOMIK</h1>

    <script>
        function startChaos() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();

            setInterval(() => {
                createPopup();
            }, 10);
        }

        function createPopup() {
            const popup = document.createElement('div');
            popup.className = 'fake-popup';
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.innerHTML = '<div class="popup-bar"></div><div style="color:black; font-size:10px; padding:5px;">FATAL_ERROR: HOMIK.exe</div>';
            document.body.appendChild(popup);

            setTimeout(() => {
                popup.remove();
            }, 50);
        }

        window.addEventListener('keydown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }, true);

        document.addEventListener('contextmenu', e => e.preventDefault());

        window.onbeforeunload = () => "HOMIK СЛЕДИТ ЗА ТОБОЙ";
    </script>
</body>
</html>
