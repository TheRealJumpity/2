<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL</title>
    <style>
        body {
            background-color: black;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            cursor: none;
            overflow: hidden;
        }
        h1 {
            font-size: 10vw;
            text-shadow: 0 0 20px red;
        }
    </style>
</head>
<body onclick="startTroll()">

    <h1>HOMIK</h1>

    <script>
        function startTroll() {
            // Входим в полный экран
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();

            // Бесконечный цикл алертов
            // Это "подвесит" вкладку, так как alert блокирует поток выполнения
            while (true) {
                alert("CRITICAL ERROR: HOMIK DETECTED");
                alert("SYSTEM BREACH: ACCESS DENIED");
                alert("REBOOTING... ERROR 0x0000001");
                alert("DO NOT CLOSE THIS WINDOW");
            }
        }

        // Блокировка клавиш
        window.addEventListener('keydown', (e) => {
            e.preventDefault();
            return false;
        }, true);

        // Защита от закрытия
        window.onbeforeunload = function() {
            return "HOMIK IS WATCHING YOU";
        };
    </script>
</body>
</html>
