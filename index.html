<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СИСТЕМА ЗАБЛОКИРОВАНА</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none; /* Полностью скрываем курсор */
            user-select: none;
        }

        h1 {
            font-family: Arial, sans-serif;
            font-size: 80px;
            letter-spacing: 15px;
            text-transform: uppercase;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 0.9; }
        }
    </style>
</head>
<body onclick="goFullscreen()">

    <h1>HOMIK</h1>

    <script>
        // Функция принудительного полноэкранного режима при первом клике
        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // Блокировка ВСЕХ стандартных комбинаций клавиш
        window.addEventListener('keydown', function(e) {
            // Блокируем F12, Ctrl+Shift+I, Ctrl+U, Alt+F4, Esc и т.д.
            e.preventDefault();
            e.stopPropagation();
            
            // Дополнительный троллинг в консоли, если её всё же откроют
            console.log("Критическая ошибка ввода. Клавиша заблокирована.");
            return false;
        }, true);

        // Блокировка правой кнопки мыши (контекстного меню)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Зацикливание фокуса (чтобы нельзя было "табнуться" наружу легко)
        window.addEventListener('blur', function() {
            setTimeout(() => {
                window.focus();
            }, 10);
        });

        // Предотвращение закрытия вкладки
        window.onbeforeunload = function() {
            return "Процесс HOMIK не завершен. Вы уверены?";
        };

        // Автоматический запрос на фулскрин каждые 2 секунды, если пользователь вышел из него
        setInterval(() => {
            if (!document.fullscreenElement) {
                console.log("Требуется полноэкранный режим");
            }
        }, 2000);
    </script>
</body>
</html>
